<aside
  class="bg-[#f0f4f8] h-full border-r border-slate-200 hidden md:flex flex-col justify-between transition-all duration-300 relative z-30 shrink-0"
  [ngClass]="layoutService.sidebarRecolhida() ? 'w-20' : 'w-64'"
>
  <button
    (click)="toggleSidebar()"
    class="absolute -right-4 top-8 bg-[#071e3d] text-white border-2 border-[#f4f7f6] rounded-full w-8 h-8 flex items-center justify-center shadow-lg hover:bg-[#0a2b5e] hover:scale-110 transition-all z-50 cursor-pointer"
    title="Expandir/Recolher Menu"
  >
    <svg
      class="w-4 h-4 transition-transform duration-300"
      [ngClass]="layoutService.sidebarRecolhida() ? 'rotate-180' : ''"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="3"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>

  <div class="flex flex-col">
    <div class="h-20 flex items-center px-4 mb-4 mt-2 overflow-hidden whitespace-nowrap">
      <div class="w-10 h-10 flex items-center justify-center shrink-0">
        <img
          src="/img/EduPresenteLogo_reduzida.png"
          alt="Logo EduPresente"
          class="max-w-full max-h-full object-contain"
        />
      </div>

      <div
        class="ml-3 transition-opacity duration-300 delay-100"
        [class.opacity-0]="layoutService.sidebarRecolhida()"
      >
        <h2 class="text-[#071e3d] font-bold text-lg leading-tight">Escola<br />Promove</h2>
        <p class="text-slate-500 text-xs">ID: 48291</p>
      </div>
    </div>

    <nav class="flex flex-col gap-2 px-3">
      <a
        routerLink="/app/dashboard"
        routerLinkActive="bg-[#86efac] text-[#071e3d]"
        class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-slate-200 transition-colors cursor-pointer group"
      >
        <svg
          class="w-6 h-6 shrink-0 group-hover:text-[#071e3d]"
          [ngClass]="layoutService.sidebarRecolhida() ? 'text-[#071e3d]' : 'text-slate-600'"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z"
          />
        </svg>
        <span
          class="font-semibold whitespace-nowrap overflow-hidden transition-all"
          [class.w-0]="layoutService.sidebarRecolhida()"
          >Dashboard</span
        >
      </a>

      <a
        routerLink="/app/alunos"
        routerLinkActive="bg-[#86efac] text-[#071e3d]"
        class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors cursor-pointer group"
      >
        <svg
          class="w-6 h-6 shrink-0 group-hover:text-[#071e3d]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"
          />
        </svg>
        <span
          class="font-semibold whitespace-nowrap overflow-hidden transition-all"
          [class.w-0]="layoutService.sidebarRecolhida()"
          >Estudantes</span
        >
      </a>

      <a
        routerLink="/app/agenda"
        routerLinkActive="bg-[#86efac] text-[#071e3d]"
        class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors cursor-pointer group"
      >
        <svg class="w-6 h-6 shrink-0 group-hover:text-[#071e3d]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3.75 9h16.5m-15 12h13.5a1.5 1.5 0 001.5-1.5V6.75a1.5 1.5 0 00-1.5-1.5H5.25a1.5 1.5 0 00-1.5 1.5V19.5A1.5 1.5 0 005.25 21z" />
        </svg>
        <span class="font-semibold whitespace-nowrap overflow-hidden transition-all" [class.w-0]="layoutService.sidebarRecolhida()">Agenda</span>
      </a>

      <a
        routerLink="/app/lgpd"
        routerLinkActive="bg-[#86efac] text-[#071e3d]"
        class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors cursor-pointer group"
      >
        <svg
          class="w-6 h-6 shrink-0 group-hover:text-[#071e3d]"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"
          />
        </svg>
        <span
          class="font-semibold whitespace-nowrap overflow-hidden transition-all"
          [class.w-0]="layoutService.sidebarRecolhida()"
          >LGPD</span
        >
      </a>

    </nav>
  </div>

  <div class="px-3 pb-6 flex flex-col gap-3">
    <button
      (click)="abrirNovaAcao()"
      class="bg-[#071e3d] text-white flex items-center justify-center gap-2 py-3 rounded-lg hover:bg-[#0a2b5e] transition-colors overflow-hidden shrink-0 shadow-md"
    >
      <svg
        class="w-6 h-6 shrink-0"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="2"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
        />
      </svg>
      <span class="font-semibold whitespace-nowrap" *ngIf="!layoutService.sidebarRecolhida()"
        >Registrar nova ação</span
      >
    </button>

    <button
      (click)="sair()"
      class="flex items-center gap-3 px-3 py-3 rounded-lg hover:bg-slate-200 text-slate-600 transition-colors cursor-pointer group"
    >
      <svg
        class="w-6 h-6 shrink-0 group-hover:text-red-600 transition-colors"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75"
        />
      </svg>
      <span
        class="font-semibold whitespace-nowrap overflow-hidden transition-all group-hover:text-red-600"
        [class.w-0]="layoutService.sidebarRecolhida()"
        >Sair</span
      >
    </button>
  </div>
</aside>

<nav class="mobile-bottom-nav md:hidden fixed inset-x-0 bottom-0 z-50 h-16 bg-white border-t border-slate-200 shadow-[0_-4px_16px_rgba(15,23,42,0.10)] grid grid-cols-5 items-center px-1 safe-area-bottom">
 <a routerLink="/app/dashboard" [ngClass]="paginaMobileAtiva('inicio') ? 'mobile-nav-active bg-[#86efac] text-[#071e3d] shadow-sm' : 'text-slate-500'" class="mobile-nav-item h-12 mx-1 rounded-xl flex flex-col items-center justify-center gap-1 text-[10px] font-semibold hover:bg-slate-100 hover:text-[#071e3d] transition-colors">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zm9.75 0a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zm9.75 0a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
    <span>Início</span>
  </a>
  <a routerLink="/app/alunos" [ngClass]="paginaMobileAtiva('alunos') ? 'mobile-nav-active bg-[#86efac] text-[#071e3d] shadow-sm' : 'text-slate-500'" class="mobile-nav-item h-12 mx-1 rounded-xl flex flex-col items-center justify-center gap-1 text-[10px] font-semibold hover:bg-slate-100 hover:text-[#071e3d] transition-colors">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766a6.375 6.375 0 0111.964-3.179M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
    <span>Alunos</span>
  </a>
  <button (click)="abrirNovaAcao()" aria-label="Registrar nova ação" class="-mt-5 mx-auto w-12 h-12 rounded-full bg-[#071e3d] text-white shadow-lg flex items-center justify-center border-4 border-[#f4f7f6]">
    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
  </button>
  <a routerLink="/app/agenda" [ngClass]="paginaMobileAtiva('agenda') ? 'mobile-nav-active bg-[#86efac] text-[#071e3d] shadow-sm' : 'text-slate-500'" class="mobile-nav-item h-12 mx-1 rounded-xl flex flex-col items-center justify-center gap-1 text-[10px] font-semibold hover:bg-slate-100 hover:text-[#071e3d] transition-colors">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3.75 9h16.5m-15 12h13.5a1.5 1.5 0 001.5-1.5V6.75a1.5 1.5 0 00-1.5-1.5H5.25a1.5 1.5 0 00-1.5 1.5V19.5A1.5 1.5 0 005.25 21z"/></svg>
    <span>Agenda</span>
  </a>
  <a routerLink="/app/lgpd" [ngClass]="paginaMobileAtiva('lgpd') ? 'mobile-nav-active bg-[#86efac] text-[#071e3d] shadow-sm' : 'text-slate-500'" class="mobile-nav-item h-12 mx-1 rounded-xl flex flex-col items-center justify-center gap-1 text-[10px] font-semibold hover:bg-slate-100 hover:text-[#071e3d] transition-colors">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751C17.206 6 14.215 4.882 12 2.714z"/></svg>
    <span>LGPD</span>
  </a>
</nav>
