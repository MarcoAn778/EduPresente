<dialog #modal class="fixed inset-0 m-auto rounded-2xl p-0 w-full max-w-lg max-w-[calc(100vw-2rem)] max-h-[calc(100dvh-2rem)] overflow-y-auto backdrop:bg-black/50 shadow-2xl">
  <div class="p-4 sm:p-6">
    <div class="flex justify-between items-start mb-6">
      <div class="flex items-center gap-3">
        <div class="bg-blue-900 text-white p-2 rounded-lg"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M19.5 3.75a3 3 0 0 0-3 3v12.75a3 3 0 0 0 3 3h1.5a3 3 0 0 0 3-3V6.75a3 3 0 0 0-3-3h-1.5Z"/></svg></div>
        <div><h3 class="font-bold text-[#071e3d]">Registrar nova ação</h3><p class="text-xs text-slate-500">{{ nomeAluno ? 'Para: ' + nomeAluno : 'Selecione um estudante' }}</p></div>
      </div>
      <button (click)="fechar()" class="text-slate-400 hover:text-black">✕</button>
    </div>
    <div class="space-y-4">
      <div *ngIf="!nomeAluno">
        <label class="text-xs font-bold text-slate-500 uppercase">Estudante</label>
        <div class="relative mt-1">
          <input
            [(ngModel)]="buscaAluno"
            (focus)="listaAlunosAberta = true"
            (input)="listaAlunosAberta = true; formulario.alunoId = ''"
            type="text"
            autocomplete="off"
            placeholder="Digite o nome do estudante..."
            class="w-full p-2.5 border rounded-lg"
          >
          <div *ngIf="listaAlunosAberta" class="absolute z-50 left-0 right-0 mt-1 max-h-48 overflow-y-auto bg-white border border-slate-200 rounded-lg shadow-lg">
            <button
              *ngFor="let aluno of alunosFiltrados"
              type="button"
              (click)="selecionarAluno(aluno)"
              class="w-full px-3 py-2.5 text-left text-sm hover:bg-slate-100 border-b border-slate-100 last:border-b-0"
            >
              <span class="font-semibold text-[#071e3d]">{{ aluno.nome }}</span>
              <span class="block text-xs text-slate-400">{{ aluno.ano }} {{ aluno.turma }} · {{ aluno.turno }}</span>
            </button>
            <p *ngIf="!alunosFiltrados.length" class="px-3 py-4 text-sm text-center text-slate-500">Nenhum estudante encontrado.</p>
          </div>
        </div>
      </div>
      <div><label class="text-xs font-bold text-slate-500 uppercase">Tipo de ação</label><select [(ngModel)]="formulario.tipo" class="w-full p-2.5 border rounded-lg mt-1"><option value="contato">Contato com responsável</option><option value="conversa">Conversa individual</option><option value="reforco">Reforço escolar</option><option value="encaminhamento">Encaminhamento</option></select></div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div><label class="text-xs font-bold text-slate-500 uppercase">Responsável</label><input [(ngModel)]="formulario.responsavel" type="text" class="w-full p-2.5 border rounded-lg mt-1" placeholder="Mariana Silva"></div>
        <div><label class="text-xs font-bold text-slate-500 uppercase">Data</label><input [(ngModel)]="formulario.data" type="date" class="w-full p-2.5 border rounded-lg mt-1"></div>
      </div>
      <div><label class="text-xs font-bold text-slate-500 uppercase">Status</label><div class="grid grid-cols-1 sm:grid-cols-3 gap-2 mt-1">
        <button (click)="selecionarStatus('Pendente')" [ngClass]="formulario.status === 'Pendente' ? 'bg-[#071e3d] text-white' : 'hover:bg-slate-50'" class="flex-1 py-2 border rounded-lg text-sm">Pendente</button>
        <button (click)="selecionarStatus('Em andamento')" [ngClass]="formulario.status === 'Em andamento' ? 'bg-[#071e3d] text-white' : 'hover:bg-slate-50'" class="flex-1 py-2 border rounded-lg text-sm">Em andamento</button>
        <button (click)="selecionarStatus('Concluída')" [ngClass]="formulario.status === 'Concluída' ? 'bg-[#071e3d] text-white' : 'hover:bg-slate-50'" class="flex-1 py-2 border rounded-lg text-sm">Concluída</button>
      </div></div>
      <div><label class="text-xs font-bold text-slate-500 uppercase">Observação</label><textarea [(ngModel)]="formulario.descricao" class="w-full p-2.5 border rounded-lg mt-1 h-24" placeholder="Descreva os detalhes da ação..."></textarea></div>
      <p *ngIf="erro" class="text-sm text-red-600">{{ erro }}</p>
    </div>
    <div class="flex flex-col-reverse sm:flex-row gap-3 mt-8"><button (click)="fechar()" class="flex-1 py-2.5 border rounded-lg font-semibold hover:bg-slate-50">Cancelar</button><button (click)="salvar()" [disabled]="salvando" class="flex-1 py-2.5 bg-[#071e3d] text-white rounded-lg font-semibold hover:bg-[#0a2b5e]">{{ salvando ? 'Salvando...' : 'Salvar Ação' }}</button></div>
  </div>
</dialog>
