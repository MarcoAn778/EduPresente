<header
  class="bg-white h-16 border-b border-slate-200 flex items-center justify-between px-3 sm:px-4 md:px-6 shrink-0 z-40"
>
  <div class="flex items-center gap-2 sm:gap-4 min-w-0">
    <img
      src="img/EduPresenteLogo_nome.png"
      alt="EduPresente Logo"
      class="h-7 sm:h-8 w-auto max-w-32 sm:max-w-none object-contain"
    />

    <div class="hidden md:block h-6 w-px bg-slate-300"></div>
    <span class="hidden lg:inline truncate text-slate-500 font-medium text-sm">{{ perfil().nome }}</span>
  </div>

  <div class="flex items-center gap-3 sm:gap-5 text-slate-500 shrink-0">
    <div class="relative">
      <button (click)="alternarPainel($event)" [attr.title]="preferencias().mostrarDicas ? 'Abrir notificações' : null" class="relative hover:text-[#071e3d] transition-colors">
        <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" /></svg>
        <span *ngIf="naoLidas" class="absolute -top-2 -right-2 min-w-4 h-4 px-1 rounded-full bg-red-500 text-white text-[9px] font-bold flex items-center justify-center">{{ naoLidas > 9 ? '9+' : naoLidas }}</span>
      </button>

      <div *ngIf="painelAberto" (click)="$event.stopPropagation()" class="fixed left-3 right-3 top-16 sm:absolute sm:left-auto sm:right-0 sm:top-10 sm:w-[360px] bg-white rounded-xl border border-slate-200 shadow-2xl overflow-hidden z-50">
        <div class="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
          <div><h3 class="font-bold text-[#071e3d] text-sm">Notificações</h3><p class="text-[10px] text-slate-400">{{ naoLidas }} não lida(s)</p></div>
          <button *ngIf="naoLidas" (click)="marcarTodasComoLidas()" class="text-[10px] font-bold text-[#071e3d] hover:underline">Marcar todas como lidas</button>
        </div>
        <div class="max-h-[380px] overflow-y-auto">
          <button *ngFor="let notificacao of notificacoes" (click)="abrirNotificacao(notificacao)" class="w-full px-4 py-3 flex gap-3 text-left border-b border-slate-100 hover:bg-slate-50 transition-colors" [class.bg-blue-50]="!notificacao.lida">
            <span class="w-2.5 h-2.5 rounded-full mt-1.5 shrink-0" [ngClass]="notificacao.cor"></span>
            <span class="min-w-0"><span class="block text-sm font-semibold text-[#071e3d]">{{ notificacao.titulo }}</span><span class="block text-xs text-slate-500 mt-0.5">{{ notificacao.descricao }}</span></span>
            <span *ngIf="!notificacao.lida" class="w-2 h-2 bg-blue-500 rounded-full shrink-0 mt-1.5"></span>
          </button>
          <div *ngIf="!notificacoes.length" class="py-10 px-4 text-center"><p class="text-sm font-semibold text-slate-500">Nenhuma notificação ativa.</p><p class="text-xs text-slate-400 mt-1">Ajuste os tipos de alerta nas configurações.</p></div>
        </div>
        <a routerLink="/app/configuracoes" (click)="painelAberto = false" class="block px-4 py-3 text-center text-xs font-bold text-[#071e3d] bg-slate-50 hover:underline">Configurar notificações</a>
      </div>
    </div>
    
    <button
      routerLink="/app/configuracoes"
      class="cursor-pointer hover:text-[#071e3d] transition-colors"
      [attr.title]="preferencias().mostrarDicas ? 'Configurações' : null"
    >
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.99l1.005.828c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"
        />
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
        />
      </svg>
    </button>

    <div class="hidden sm:block h-6 w-px bg-slate-300 mx-1 sm:mx-2"></div>

    <div routerLink="/app/configuracoes"
      [attr.title]="preferencias().mostrarDicas ? 'Perfil e configurações' : null"
      aria-label="Abrir perfil e configurações"
      class="hidden sm:flex w-8 h-8 rounded-full bg-[#f0f4f8] text-slate-500 border border-slate-200 cursor-pointer items-center justify-center"
    >
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6.75a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.118a7.5 7.5 0 0115 0A17.93 17.93 0 0112 21.75c-2.676 0-5.216-.584-7.5-1.632z" />
      </svg>
    </div>
  </div>
</header>
