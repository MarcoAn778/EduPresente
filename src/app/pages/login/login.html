<div class="min-h-screen flex items-center justify-center bg-slate-100 p-4 font-sans">
  <div class="bg-white p-6 sm:p-8 md:p-10 rounded-xl shadow-lg w-full max-w-md">
    <div class="flex justify-center mb-6">
      <img src="/img/EduPresenteLogo.png" alt="Logo EduPresente" class="h-40 sm:h-52 md:h-60 object-contain" />
    </div>

    <div>
      <h2 class="text-lg font-semibold text-[#071e3d] mb-1">Acesse sua área</h2>
      <p class="text-xs text-slate-500 mb-6">Insira suas credenciais para continuar.</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="mb-5">
          <label for="email" class="block text-sm font-semibold text-slate-700 mb-2">E-mail</label>
          <div class="relative flex items-center">
            <svg
              class="absolute left-4 w-5 h-5 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75"
              />
            </svg>
            <input
              type="email"
              id="email"
              formControlName="email"
              placeholder="nome@escola.gov.br"
              class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-800 transition-colors focus:outline-none focus:border-[#071e3d] focus:ring-1 focus:ring-[#071e3d] focus:bg-white"
              [ngClass]="{
                'border-red-500 focus:border-red-500 focus:ring-red-500':
                  loginForm.get('email')?.invalid && loginForm.get('email')?.touched,
              }"
            />
          </div>
        </div>

        <div class="mb-6">
          <div class="flex justify-between items-center mb-2">
            <label for="senha" class="text-sm font-semibold text-slate-700">Senha</label>
            <a
              href="mailto:suporte@escola.com?subject=Recuperação de senha - EduPresente"
              class="text-xs text-slate-500 hover:text-[#071e3d] hover:underline transition-colors"
              >Esqueci minha senha</a
            >
          </div>
          <div class="relative flex items-center">
            <svg
              class="absolute left-4 w-5 h-5 text-slate-400"
              fill="none"
              viewBox="0 0 24 24"
              stroke-width="1.5"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"
              />
            </svg>

            <input
              [type]="mostrarSenha ? 'text' : 'password'"
              id="senha"
              formControlName="senha"
              placeholder="••••••••"
              class="w-full pl-11 pr-11 py-3 bg-slate-50 border border-slate-300 rounded-lg text-sm text-slate-800 transition-colors focus:outline-none focus:border-[#071e3d] focus:ring-1 focus:ring-[#071e3d] focus:bg-white"
              [ngClass]="{
                'border-red-500 focus:border-red-500 focus:ring-red-500':
                  loginForm.get('senha')?.invalid && loginForm.get('senha')?.touched,
              }"
            />

            <button
              type="button"
              (click)="toggleSenha()"
              [attr.aria-label]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'"
              [attr.title]="mostrarSenha ? 'Ocultar senha' : 'Mostrar senha'"
              class="absolute right-4 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none"
            >
              <svg
                *ngIf="mostrarSenha"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88"
                />
              </svg>
              <svg
                *ngIf="!mostrarSenha"
                class="w-5 h-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="1.5"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                />
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"
                />
              </svg>
            </button>
          </div>
        </div>

        <div class="flex flex-col gap-3 mb-8">
          <label class="flex items-center gap-2 text-sm text-slate-500 cursor-pointer group">
            <input
              type="checkbox"
              class="w-4 h-4 rounded border-slate-300 text-[#071e3d] focus:ring-[#071e3d] cursor-pointer"
            />
            <span class="group-hover:text-slate-700 transition-colors">Manter conectado</span>
          </label>

          <label *ngIf="exigirTermos" class="flex items-center gap-2 text-sm text-slate-500 cursor-pointer group">
            <input
              type="checkbox"
              formControlName="termos"
              class="w-4 h-4 rounded border-slate-300 text-[#071e3d] focus:ring-[#071e3d] cursor-pointer"
            />
            <span class="group-hover:text-slate-700 transition-colors">
              Li e aceito os
              <a routerLink="/lgpd" class="text-[#071e3d] font-semibold hover:underline"
                >termos e condições</a
              >
            </span>
          </label>
        </div>

        <div
          *ngIf="erroLogin"
          class="text-red-500 text-sm text-center mb-4 bg-red-50 p-2 rounded border border-red-100"
        >
          Credenciais inválidas. O acesso padrão é coordenador&#64;escolapromove.com / 123456.
        </div>

        <button
          type="button"
          (click)="onSubmit()"
          [disabled]="loginForm.invalid || processando"
          class="w-full bg-[#071e3d] hover:bg-[#0a2b5e] disabled:bg-slate-400 text-white font-semibold py-3.5 rounded-lg flex justify-center items-center gap-2 transition-all cursor-pointer disabled:cursor-not-allowed"
        >
          {{ processando ? 'Entrando...' : 'Entrar' }}
          <svg
            class="w-5 h-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"
            />
          </svg>
        </button>
      </form>
    </div>

    <div class="mt-10 text-center">
      <hr class="border-t border-slate-200 mb-5" />
      <p class="text-xs text-slate-400 italic">"Acompanhar cedo é cuidar melhor."</p>
    </div>
  </div>
</div>
